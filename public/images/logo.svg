<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Warm background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d2b1a"/>
      <stop offset="100%" stop-color="#5a3d2b"/>
    </linearGradient>

    <!-- Gold gradient for couch -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8b86d"/>
      <stop offset="40%" stop-color="#c99a3b"/>
      <stop offset="100%" stop-color="#a67c2e"/>
    </linearGradient>

    <!-- Dark wood gradient for couch legs -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b0e"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8b86d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8b86d" stop-opacity="0"/>
    </radialGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#e8b86d" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="20" y="20" width="460" height="460" rx="40" fill="url(#bgGrad)" stroke="#d4a373" stroke-width="2" filter="url(#shadow)"/>

  <!-- Inner glow overlay -->
  <rect x="20" y="20" width="460" height="460" rx="40" fill="url(#glow)"/>

  <!-- Decorative border ring -->
  <rect x="35" y="35" width="430" height="430" rx="32" fill="none" stroke="#d4a373" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>

  <!-- Couch icon – centered -->
  <g transform="translate(250, 260)" filter="url(#glowShadow)">
    <!-- Couch backrest (main body) -->
    <rect x="-90" y="-40" width="180" height="70" rx="10" fill="url(#goldGrad)"/>

    <!-- Cushion details (horizontal lines) -->
    <line x1="-70" y1="-20" x2="70" y2="-20" stroke="#8b6914" stroke-width="2" opacity="0.3"/>
    <line x1="-70" y1="-10" x2="70" y2="-10" stroke="#8b6914" stroke-width="2" opacity="0.3"/>

    <!-- Armrests -->
    <rect x="-105" y="-30" width="20" height="50" rx="6" fill="url(#goldGrad)"/>
    <rect x="85" y="-30" width="20" height="50" rx="6" fill="url(#goldGrad)"/>

    <!-- Seat cushion (front) -->
    <rect x="-80" y="20" width="160" height="18" rx="6" fill="url(#goldGrad)"/>

    <!-- Legs -->
    <rect x="-70" y="38" width="10" height="30" rx="3" fill="url(#darkGrad)"/>
    <rect x="-20" y="38" width="10" height="30" rx="3" fill="url(#darkGrad)"/>
    <rect x="30" y="38" width="10" height="30" rx="3" fill="url(#darkGrad)"/>
    <rect x="60" y="38" width="10" height="30" rx="3" fill="url(#darkGrad)"/>

    <!-- Decorative tufting (small circles) -->
    <circle cx="-50" cy="-15" r="4" fill="#a67c2e" opacity="0.5"/>
    <circle cx="0" cy="-15" r="4" fill="#a67c2e" opacity="0.5"/>
    <circle cx="50" cy="-15" r="4" fill="#a67c2e" opacity="0.5"/>
  </g>

  <!-- "FH" monogram – placed above the couch -->
  <text x="250" y="120" font-family="'Georgia','Times New Roman',serif" font-size="80" font-weight="bold" fill="#f0d5a8" text-anchor="middle" letter-spacing="8" filter="url(#shadow)">
    FH
  </text>

  <!-- Tagline -->
  <text x="250" y="430" font-family="'Arial','Helvetica',sans-serif" font-size="18" fill="#d4a373" text-anchor="middle" letter-spacing="4" font-weight="300">
    FURNITURE HAVEN
  </text>
  <text x="250" y="456" font-family="'Arial','Helvetica',sans-serif" font-size="11" fill="#a08a78" text-anchor="middle" letter-spacing="2" font-weight="300">
    HANDCRAFTED WITH CARE
  </text>
</svg>