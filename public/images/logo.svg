<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf6f0"/>
      <stop offset="100%" stop-color="#e0d5c8"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a373"/>
      <stop offset="50%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#c87a3a"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3520"/>
      <stop offset="100%" stop-color="#2d1b0e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Square background with rounded corners -->
  <rect x="20" y="20" width="460" height="460" rx="36" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="3" filter="url(#shadow)"/>
  <rect x="30" y="30" width="440" height="440" rx="28" fill="none" stroke="#d4b896" stroke-width="1.5" stroke-dasharray="8 6"/>

  <!-- Stylized furniture icon (chair + table) -->
  <g transform="translate(250, 268)">
    <!-- Table top -->
    <rect x="-80" y="-30" width="160" height="12" rx="4" fill="url(#goldGrad)"/>
    <!-- Table legs -->
    <rect x="-70" y="-18" width="8" height="45" rx="2" fill="url(#darkGrad)"/>
    <rect x="62" y="-18" width="8" height="45" rx="2" fill="url(#darkGrad)"/>
    <!-- Chair seat -->
    <rect x="-45" y="10" width="90" height="14" rx="3" fill="url(#goldGrad)"/>
    <!-- Chair back -->
    <rect x="-35" y="-40" width="70" height="50" rx="5" fill="url(#goldGrad)"/>
    <!-- Chair legs -->
    <rect x="-40" y="24" width="8" height="30" rx="2" fill="url(#darkGrad)"/>
    <rect x="32" y="24" width="8" height="30" rx="2" fill="url(#darkGrad)"/>
    <!-- Chair armrests -->
    <rect x="-50" y="-15" width="8" height="25" rx="2" fill="url(#darkGrad)"/>
    <rect x="42" y="-15" width="8" height="25" rx="2" fill="url(#darkGrad)"/>
  </g>

  <!-- "FH" monogram -->
  <text x="250" y="145" font-family="'Georgia','Times New Roman',serif" font-size="76" font-weight="bold" fill="url(#darkGrad)" text-anchor="middle" letter-spacing="6" filter="url(#shadow)">
    FH
  </text>

  <!-- Tagline -->
  <text x="250" y="432" font-family="'Arial','Helvetica',sans-serif" font-size="18" fill="#6b4c3b" text-anchor="middle" letter-spacing="4" font-weight="300">
    FURNITURE HAVEN
  </text>
  <text x="250" y="456" font-family="'Arial','Helvetica',sans-serif" font-size="11" fill="#a08a78" text-anchor="middle" letter-spacing="2" font-weight="300">
    HANDCRAFTED WITH CARE
  </text>
</svg>